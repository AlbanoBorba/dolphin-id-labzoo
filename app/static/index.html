<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolphinID — Identificação de Botos</title>
    <meta name="description" content="Ferramenta de identificação automática de botos-pescadores via foto-identificação de nadadeira dorsal">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="header" id="main-header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🐬</span>
                <span class="logo-text">DolphinID</span>
            </div>
        </div>
        <nav class="header-nav">
            <a href="#/" class="nav-link active" data-route="home" id="nav-home">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Início
            </a>
            <a href="#/gallery" class="nav-link" data-route="gallery" id="nav-gallery">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Galeria
            </a>
            <a href="#/embeddings" class="nav-link" data-route="embeddings" id="nav-embeddings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                Espaço Latente
            </a>
        </nav>
        <div class="header-right">
            <div class="status-indicator" id="system-status" title="Status do sistema">
                <span class="status-dot"></span>
                <span class="status-text">Carregando...</span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content" id="app">
        <!-- Content will be rendered by JS router -->
        <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p>Carregando DolphinID...</p>
        </div>
    </main>

    <!-- Toast notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/upload.js"></script>
    <script src="/static/js/processing.js"></script>
    <script src="/static/js/results.js"></script>
    <script src="/static/js/gallery.js"></script>
</body>
</html>
